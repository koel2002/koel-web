<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOEL GROUP BD | Advanced AI Sourcing Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background: #0b0f19; }
        .ai-border { border-radius: 2rem; background: linear-gradient(to right, #1e40af, #9333ea); padding: 2px; }
        .ai-card { background: #050810; border-radius: calc(2rem - 2px); }
        .glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="text-gray-300">

    <!-- Header -->
    <nav class="fixed top-0 w-full z-[100] backdrop-blur-xl border-b border-white/5 px-6 py-5 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <img src="logo.png" alt="KOEL" class="h-8 w-auto" onerror="this.style.display='none'">
            <span class="text-xl font-extrabold tracking-tighter text-white uppercase">KOEL GROUP <span class="text-blue-500">BD</span></span>
        </div>
        <a href="https://wa.me/8801970493357" class="bg-white text-black px-6 py-2 rounded-full text-[10px] font-black tracking-widest hover:bg-blue-600 hover:text-white transition">PARTNER LOGIN</a>
    </nav>

    <!-- Hero Section -->
    <section class="relative pt-48 pb-20 px-6 text-center">
        <h1 class="text-6xl md:text-8xl font-black text-white mb-6 tracking-tighter leading-none italic uppercase">AI SOURCING.<br>AUTOPILOT.</h1>
        <p class="text-gray-500 text-sm md:text-lg mb-10 max-w-2xl mx-auto uppercase tracking-tighter font-bold">Predictive Intelligence & Real-time Transparency for Global Brands.</p>
        <div class="flex justify-center space-x-4">
            <a href="#tracking" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black tracking-widest text-xs uppercase shadow-2xl">Live Tracker</a>
        </div>
    </section>

    <!-- Tracking Section -->
    <section id="tracking" class="py-20 px-6">
        <div class="max-w-4xl mx-auto bg-white/5 p-12 rounded-[3rem] border border-white/5 text-center glow">
            <h2 class="text-3xl font-black text-white mb-8 italic uppercase tracking-widest">Operation Control</h2>
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                <input type="text" id="orderID" placeholder="INPUT ID CODE" class="bg-black border border-white/10 px-8 py-5 rounded-2xl text-white focus:border-blue-500 w-full md:w-[400px] font-bold text-center">
                <button onclick="trackOrder()" class="bg-white text-black px-10 py-5 rounded-2xl font-black tracking-widest hover:bg-blue-600 hover:text-white transition uppercase">Execute</button>
            </div>
            <div id="statusResult" class="mt-10 hidden p-8 bg-blue-500/10 rounded-[2.5rem] border border-blue-500/20 text-center font-bold tracking-widest uppercase"></div>
        </div>
    </section>

    <!-- Inquiry Section -->
    <section id="contact" class="py-20 px-6">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
            <div>
                <h2 class="text-5xl font-black text-white mb-6 italic uppercase tracking-tighter">Sync to <br> Master CRM.</h2>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest leading-loose">Data synced to Global Hub for instant merchandiser assignment.</p>
                <p class="text-white font-bold mt-6">+880 1970-493357</p>
            </div>
            <div class="ai-border glow">
                <div class="ai-card p-2 overflow-hidden h-[550px]">
                    <!-- Tally ফর্ম কানেকশন - নিশ্চিত হোন ID EkMJG2 এবং এটি Publish করা আছে -->
                    <iframe data-tally-src="https://tally.so/embed/EkMJG2?hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="100%" frameborder="0" title="KOEL Sync"></iframe>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-[8px] font-bold text-gray-700 uppercase tracking-[0.6em] border-t border-white/5">
        &copy; 2025 KOEL GROUP BD // AI CORE v2.0
    </footer>

    <!-- চ্যাট বাটনসমূহ (WhatsApp & AI) -->
    <div class="fixed bottom-10 right-10 z-[100] flex flex-col space-y-4">
        <a href="https://wa.me/8801970493357" class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
    </div>

    <!-- Scripts -->
    <script>
        function trackOrder() {
            const id = document.getElementById('orderID').value.toUpperCase().trim();
            const res = document.getElementById('statusResult');
            res.classList.remove('hidden');
            if(id === "") { res.innerHTML = "<span class='text-red-500'>ERROR: NULL ID</span>"; return; }
            res.className = "mt-10 p-8 bg-blue-500/5 rounded-[2.5rem] border border-blue-500/20";
            if(id.startsWith("JAYQO/")) {
                res.innerHTML = `<div class="text-white text-3xl font-black mb-2 italic">${id}</div><div class="text-blue-400">FABRIC SOURCING STAGE</div>`;
            } else if(id.startsWith("KOEL/HCF/")) {
                res.innerHTML = `<div class="text-white text-3xl font-black mb-2 italic">${id}</div><div class="text-purple-400">SEWING & QA PHASE</div>`;
            } else { res.innerHTML = `<div class="text-yellow-500">Manual Verification Required for ${id}</div>`; }
        }
    </script>
    <script async src="https://tally.so/widgets/embed.js"></script>
    <!-- আপনার বোটপ্রেস স্ক্রিপ্ট (এই আইডিটি ইউনিক, তাই এটি পরিবর্তন করবেন না) -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/05/31/00/20260531001126-F10XE7L5.js" defer></script>
</body>
</html>
